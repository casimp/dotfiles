# ~/.tmux.conf - managed by dotfiles

# ---------------------------------------------------------------------------
# Prefix: Ctrl+a (instead of Ctrl+b)
# ---------------------------------------------------------------------------
unbind C-b
set -g prefix C-a
bind C-a send-prefix

# ---------------------------------------------------------------------------
# General settings
# ---------------------------------------------------------------------------
set -g mouse on
set -g base-index 1
setw -g pane-base-index 1
set -g renumber-windows on
set -g history-limit 50000
set -g set-clipboard on
set -sg escape-time 0
set -g focus-events on

# Notifications (bell when Claude needs you)
set -g visual-bell off
set -g bell-action other
set -g monitor-bell on
set -g allow-passthrough on

# True color support
set -g default-terminal "tmux-256color"
set -ag terminal-overrides ",xterm-256color:RGB"

# ---------------------------------------------------------------------------
# Keybindings
# ---------------------------------------------------------------------------

# Reload config
bind r source-file ~/.tmux.conf \; display-message "Config reloaded"

# Split panes with | and -
bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"
unbind '"'
unbind %

# New window in current path
bind c new-window -c "#{pane_current_path}"

# Vim-style pane navigation (no prefix needed)
bind -n M-h select-pane -L
bind -n M-j select-pane -D
bind -n M-k select-pane -U
bind -n M-l select-pane -R

# Resize panes with Ctrl+hjkl
bind -r C-h resize-pane -L 5
bind -r C-j resize-pane -D 5
bind -r C-k resize-pane -U 5
bind -r C-l resize-pane -R 5

# Tmux-sessionizer
bind -r f run-shell "tmux neww tmux-sessionizer"

# Quick window switching
bind -n M-1 select-window -t 1
bind -n M-2 select-window -t 2
bind -n M-3 select-window -t 3
bind -n M-4 select-window -t 4
bind -n M-5 select-window -t 5

# ---------------------------------------------------------------------------
# Copy mode (vi style)
# ---------------------------------------------------------------------------
setw -g mode-keys vi
bind -T copy-mode-vi v send-keys -X begin-selection
bind -T copy-mode-vi y send-keys -X copy-selection-and-cancel

# ---------------------------------------------------------------------------
# Status bar
# ---------------------------------------------------------------------------
set -g status-position bottom
set -g status-style "bg=#1e1e2e,fg=#cdd6f4"
set -g status-left-length 40
set -g status-right-length 80
set -g status-left "#[fg=#89b4fa,bold] #S #[fg=#585b70]| "
set -g status-right "#[fg=#585b70]| #[fg=#a6adc8]%H:%M  %d-%b"

# Window status (bell flag shows when Claude needs you)
setw -g window-status-format "#[fg=#585b70] #I:#W#{?window_bell_flag, #[fg=#f38ba8]●,} "
setw -g window-status-current-format "#[fg=#89b4fa,bold] #I:#W "

# Pane borders
set -g pane-border-style "fg=#313244"
set -g pane-active-border-style "fg=#89b4fa"

# ---------------------------------------------------------------------------
# Plugins (TPM)
# ---------------------------------------------------------------------------
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-sensible'
set -g @plugin 'tmux-plugins/tmux-resurrect'
set -g @plugin 'tmux-plugins/tmux-continuum'
set -g @plugin 'l-lin/tmux-navi'

# Resurrect config
set -g @resurrect-capture-pane-contents 'on'

# Continuum config
set -g @continuum-restore 'on'
set -g @continuum-save-interval '15'

# Navi config (Ctrl+a Ctrl+g to open cheat sheet popup)
set -g @tmux-navi-key-binding 'C-g'
set -g @tmux-navi-width '90%'
set -g @tmux-navi-height '90%'

# ---------------------------------------------------------------------------
# Initialize TPM (keep this at the very bottom)
# ---------------------------------------------------------------------------
if "test ! -d ~/.tmux/plugins/tpm" \
   "run 'git clone https://github.com/tmux-plugins/tpm ~/.tmux/plugins/tpm && ~/.tmux/plugins/tpm/bin/install_plugins'"
run '~/.tmux/plugins/tpm/tpm'
